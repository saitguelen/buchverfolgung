services:
  - type: web
    name: buchclub-web
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: buchclub-db
          property: connectionString
      - key: INVITE_CODE
        value: "bookclub2026"
      - key: ADMIN_PASSWORD
        value: "admin123"

databases:
  - name: buchclub-db
    databaseName: buchverfolgung
    user: buch_user
    plan: free
